<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="RupiahScan — Deteksi uang rupiah otomatis untuk tunanetra.">
    <title>RupiahScan</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- 
         ARIA LIVE REGION
         Tidak terlihat di layar.
         Dibaca otomatis oleh screen reader (TalkBack/VoiceOver)
         saat isinya berubah — penting untuk aksesibilitas tunanetra.
          -->
    <div id="aria-live"
         aria-live="assertive"
         aria-atomic="true"
         role="alert">
    </div>

    <!-- 
         LAYAR LOADING
         Tampil saat aplikasi pertama dibuka.
          -->
    <div id="loading-screen" role="status">
        <div class="loading-icon">🏦</div>
        <div class="loading-title">RupiahScan</div>
        <div class="loading-sub" id="loading-msg">Memuat aplikasi...</div>
        <div class="loading-spinner"></div>
    </div>

    <!-- 
         ERROR SCREEN
         Tampil jika ada masalah (kamera ditolak, server mati, dll).
         Tombol "Coba Lagi" memanggil retryInit() di app.js.
          -->
    <div id="error-screen" role="alert">
        <div class="error-icon">⚠️</div>
        <div class="error-title" id="error-title">Terjadi Masalah</div>
        <div class="error-msg"   id="error-msg"></div>
        <button class="error-retry" onclick="retryInit()">
            Coba Lagi
        </button>
    </div>

    <!-- 
         VIDEO KAMERA — FULLSCREEN
         Kamera belakang dibuka otomatis oleh app.js.
         aria-hidden="true" karena kontennya (video) tidak
         bermakna untuk screen reader.
          -->
    <video id="camera-video"
           autoplay
           muted
           playsinline
           aria-hidden="true">
    </video>

    <!-- 
         FRAME PANDUAN TENGAH
         Kotak dengan sudut-sudut kuning di tengah layar.
         Membantu mengarahkan uang ke posisi yang tepat.
         Warna berubah hijau saat uang berhasil terdeteksi.
          -->
    <div id="guide-frame" aria-hidden="true">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <!-- 
         BANNER HASIL DETEKSI — ATAS LAYAR
         Tampil saat uang berhasil dideteksi.
         Menampilkan nominal (Rp 50.000) dan ucapan.
          -->
    <div id="result-banner" aria-hidden="true">
        <div id="result-nominal"></div>
        <div id="result-words"></div>
    </div>

    <!-- 
         ANIMASI GELOMBANG AUDIO
         5 batang yang bergerak saat sistem berbicara (TTS aktif).
         Menjadi aktif saat SpeechSynthesis.onstart terpanggil.
          -->
    <div id="audio-wave" aria-hidden="true">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
    </div>

    <!-- 
         STATUS BAR BAWAH
         Menampilkan panduan teks:
         "Arahkan uang ke kamera" / "Dekatkan uang" / "Rp 50.000"
          -->
    <div id="status-bar" role="status">
        <span id="status-icon" aria-hidden="true"></span>
        <div  id="status-text" aria-live="polite">Memulai kamera...</div>
    </div>

    <!-- 
         CONFIDENCE BAR
         Bar vertikal kecil di sisi kanan layar.
         Menunjukkan tingkat keyakinan model (0–100%).
         Diisi oleh app.js sesuai nilai confidence dari server.
          -->
    <div id="confidence-bar" aria-hidden="true">
        <div id="confidence-fill"></div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
